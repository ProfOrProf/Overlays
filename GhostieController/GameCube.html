<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #333;
      overflow: hidden;
      width: 978px; height: 837px;
    }

    .controller {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 978px; height: 837px;
      position: relative;
    }
    .controller.gc {
      background: url(https://proforprof.com/GhostieController/base.svg) no-repeat;
      height: 837px; width: 978px;
    }

    /* Triggers — absolute positioned, not relying on .triggers wrapper */
    .gc .lt-wrap {
      position: absolute;
      top: 18px; left: 60px;
      width: 160px; height: 70px;
    }
    .gc .rt-wrap {
      position: absolute;
      top: 18px; right: 60px;
      width: 160px; height: 70px;
    }
    .gc .trigger {
      width: 100%; height: 100%;
      background: url(https://proforprof.com/GhostieController/trigger.svg) no-repeat center;
      background-size: contain;
      opacity: 0.6;
    }

    /* Bumpers — absolute positioned individually */
    .gc .lb-wrap {
      position: absolute;
      top: 115px; left: 40px;
      width: 190px; height: 55px;
    }
    .gc .rb-wrap {
      position: absolute;
      top: 115px; right: 40px;
      width: 190px; height: 55px;
    }
    .gc .bumper {
      width: 100%; height: 100%;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      opacity: 0.7;
    }
    .gc .bumper.left  { background-image: url(https://proforprof.com/GhostieController/lbpress.svg); }
    .gc .bumper.right { background-image: url(https://proforprof.com/GhostieController/rbpress.svg); }

    /* Start */
    .gc .start-wrap {
      position: absolute;
      top: 310px; left: 453px;
      width: 54px; height: 54px;
    }
    .gc .start {
      width: 100%; height: 100%;
      background: #e7e7e7;
      border-radius: 100%;
      border: solid 4.5px rgba(0,0,0,0.65);
      background-clip: content-box;
      opacity: 0.5;
    }

    /* ABXY — moved down and right */
    .gc .abxy {
      position: absolute;
      width: 290px; height: 230px;
      top: 230px; left: 630px;
    }
    .gc .button {
      position: absolute;
      background-repeat: no-repeat;
      background-size: contain;
      opacity: 0.65;
    }
    /* A — large green, center */
    .gc .a {
      background-image: url(https://proforprof.com/GhostieController/apress.svg);
      width: 120px; height: 120px;
      top: 60px; left: 85px;
    }
    /* B — red, bottom left */
    .gc .b {
      background-image: url(https://proforprof.com/GhostieController/bpress.svg);
      width: 72px; height: 72px;
      top: 140px; left: 20px;
    }
    /* X — grey, right */
    .gc .x {
      background-image: url(https://proforprof.com/GhostieController/xpress.svg);
      width: 72px; height: 108px;
      top: 55px; right: 5px;
    }
    /* Y — grey, top left */
    .gc .y {
      background-image: url(https://proforprof.com/GhostieController/ypress.svg);
      width: 108px; height: 68px;
      top: 5px; left: 50px;
    }

    /* Sticks */
    .gc .stick-left-wrap {
      position: absolute;
      top: 285px; left: 130px;
      width: 121px; height: 121px;
    }
    .gc .stick-right-wrap {
      position: absolute;
      top: 460px; left: 575px;
      width: 84px; height: 84px;
    }
    .gc .stick-left-wrap .stick {
      width: 100%; height: 100%;
      background: url(https://proforprof.com/GhostieController/left-stick.svg) center no-repeat;
      background-size: contain;
      opacity: 0.5;
    }
    .gc .stick-right-wrap .stick {
      width: 100%; height: 100%;
      background: url(https://proforprof.com/GhostieController/cstick.svg) center no-repeat;
      background-size: contain;
      opacity: 0.5;
    }

    /* D-Pad — single SVG per direction, using the dpad sprite */
    .gc .dpad {
      position: absolute;
      width: 128px; height: 128px;
      top: 455px; left: 278px;
    }
    .gc .face {
      position: absolute;
      background: url(https://proforprof.com/GhostieController/dpad.svg) no-repeat;
      opacity: 0.65;
    }
    .gc .face.up, .gc .face.down   { width: 44px; height: 65px; }
    .gc .face.left, .gc .face.right { width: 65px; height: 44px; }
    .gc .face.up    { left: 42px; top: 0;    background-position: 0px 0px;   }
    .gc .face.down  { left: 42px; bottom: 0; background-position: -46px 0;   }
    .gc .face.left  { top: 43px;  left: 0;   background-position: -93px 0;   }
    .gc .face.right { top: 43px;  right: 0;  background-position: -160px 0;  }
  </style>
</head>
<body>

  <div class="controller gc" id="controller">

    <!-- Triggers -->
    <div class="lt-wrap"><div class="trigger"></div></div>
    <div class="rt-wrap"><div class="trigger"></div></div>

    <!-- Bumpers -->
    <div class="lb-wrap"><div class="bumper left"></div></div>
    <div class="rb-wrap"><div class="bumper right"></div></div>

    <!-- Start -->
    <div class="start-wrap"><div class="start"></div></div>

    <!-- ABXY -->
    <div class="abxy">
      <span class="button a"></span>
      <span class="button b"></span>
      <span class="button x"></span>
      <span class="button y"></span>
    </div>

    <!-- Sticks -->
    <div class="stick-left-wrap"><div class="stick"></div></div>
    <div class="stick-right-wrap"><div class="stick"></div></div>

    <!-- D-Pad -->
    <div class="dpad">
      <div class="face up"></div>
      <div class="face down"></div>
      <div class="face left"></div>
      <div class="face right"></div>
    </div>

  </div>

</body>
</html>
