<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0; padding: 0;
      background: transparent !important;
      overflow: hidden;
    }

    /* === GC Controller CSS === */
    .controller {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .controller.gc {
      background: url(https://proforprof.com/GhostieController/base.svg) no-repeat;
      height: 837px;
      width: 978px;
    }
    .gc.disconnected {
      background: url(https://proforprof.com/GhostieController/disconnected.svg) no-repeat;
    }
    .gc.disconnected div { display: none; }

    /* Triggers */
    .gc .triggers {
      width: 775px; height: 95px;
      position: absolute; left: 102px;
    }
    .gc .trigger {
      width: 131px; height: 100%;
      background: url(https://proforprof.com/GhostieController/trigger.svg);
      opacity: 0;
    }
    .gc .trigger.left { float: left; }
    .gc .trigger.right { float: right; }
    .gc .trigger.pressed { opacity: 1; }

    /* Bumpers */
    .gc .bumpers {
      position: absolute; width: 792px; height: 73px;
      left: 103px; top: 138px;
    }
    .gc .bumper {
      width: 158px; height: 100%;
      background: url(https://proforprof.com/GhostieController/buttons.svg) no-repeat;
      background-position: -358px 0px;
      opacity: 0;
    }
    .gc .bumper.pressed { opacity: 1; }
    .gc .bumper.left {
      -webkit-transform: rotateY(180deg);
      transform: rotateY(180deg);
      float: left;
    }
    .gc .bumper.right { float: right; }

    /* Start */
    .gc .arrows {
      position: absolute; width: 50px; height: 50px;
      top: 324px; left: 465px;
    }
    .gc .back, .gc .start {
      width: 43px; height: 43px;
      background: #e7e7e7;
      border-radius: 100%;
      border: solid 4.5px rgba(0,0,0,0.65);
      background-clip: content-box;
      opacity: 0;
    }
    .gc .back.pressed, .gc .start.pressed {
      opacity: 1;
      filter: invert(1);
      -webkit-filter: invert(1);
    }
    .gc .back { display: none; }
    .gc .start { float: right; }

    /* ABXY */
    .gc .abxy {
      position: absolute; width: 288px; height: 230px;
      top: 207px; left: 640px;
    }
    .gc .button {
      position: absolute;
      background: url(https://proforprof.com/GhostieController/buttons.svg);
      opacity: 0;
    }
    .gc .button.pressed { opacity: 1; }
    .gc .a { background-position: 0 0; width: 114px; height: 114px; bottom: 35px; left: 91px; }
    .gc .b { width: 71px; height: 71px; background-position: -116px 0; bottom: 0px; left: 1px; }
    .gc .x { width: 66px; height: 103px; background-position: -292px 0; top: 65px; right: 0px; }
    .gc .y { width: 103px; height: 66px; background-position: -189px 0; left: 67px; top: 2px; }

    /* Sticks */
    .gc .sticks {
      position: absolute; width: 628px; height: 392px;
      top: 258px; left: 106px;
    }
    .gc .stick { position: absolute; }
    .gc .stick.left {
      top: 24px; left: 23px;
      background: url(https://proforprof.com/GhostieController/left-stick.svg) center no-repeat;
      height: 121px; width: 121px;
    }
    .gc .stick.right {
      top: calc(100% - 127px); left: calc(100% - 125px);
      background: url(https://proforprof.com/GhostieController/cstick.svg) center no-repeat;
      width: 84px; height: 84px;
    }

    /* D-Pad */
    .gc .dpad {
      position: absolute; width: 130px; height: 130px;
      top: 497px; left: 263px;
    }
    .gc .face {
      background: url(https://proforprof.com/GhostieController/dpad.svg) no-repeat;
      position: absolute; opacity: 0;
    }
    .gc .face.up, .gc .face.down { width: 44px; height: 65px; }
    .gc .face.left, .gc .face.right { width: 65px; height: 44px; }
    .gc .face.up    { left: 42px; top: 0;    background-position: 0px 0px; }
    .gc .face.down  { left: 42px; bottom: 0; background-position: -46px 0; }
    .gc .face.left  { top: 43px; left: 0;    background-position: -93px 0; }
    .gc .face.right { top: 43px; right: 0px; background-position: -160px 0; }
    .gc .face.pressed { opacity: 1; }
  </style>
</head>
<body>

  <div class="controller gc disconnected" id="controller">
    <div class="triggers">
      <div class="trigger left"  data-name="lt"></div>
      <div class="trigger right" data-name="rt"></div>
      <span class="clear"></span>
    </div>
    <div class="bumpers">
      <div class="bumper left"  data-name="lb"></div>
      <div class="bumper right" data-name="rb"></div>
      <span class="clear"></span>
    </div>
    <div class="arrows">
      <div class="start" data-name="start"></div>
    </div>
    <div class="abxy">
      <div class="button a" data-name="a"></div>
      <div class="button b" data-name="b"></div>
      <div class="button x" data-name="x"></div>
      <div class="button y" data-name="y"></div>
    </div>
    <div class="sticks">
      <div class="stick left"  id="stick-left"></div>
      <div class="stick right" id="stick-right"></div>
    </div>
    <div class="dpad">
      <div class="face up"    data-name="dup"></div>
      <div class="face down"  data-name="ddown"></div>
      <div class="face left"  data-name="dleft"></div>
      <div class="face right" data-name="dright"></div>
    </div>
  </div>

  <script>
    // GC button mapping (standard gamepad API layout)
    // Buttons:  0=A  1=B  2=X  3=Y  4=LB  5=RB  6=LT  7=RT  8=back  9=start
    //           12=dup  13=ddown  14=dleft  15=dright
    // Axes:     0=LX  1=LY  2=RX  3=RY
    var BUTTON_MAP = {
      0:  'a',
      1:  'b',
      2:  'x',
      3:  'y',
      4:  'lb',
      5:  'rb',
      9:  'start',
      12: 'dup',
      13: 'ddown',
      14: 'dleft',
      15: 'dright'
    };

    var STICK_OFFSET   = 22;   // max px stick travel
    var DEADZONE       = 0.25;
    var TRIGGER_THRESH = 0.1;  // analog threshold for LT/RT pressed class

    var ctrl = document.getElementById('controller');

    function q(name) {
      return ctrl.querySelector('[data-name="' + name + '"]');
    }

    function setPressed(el, on) {
      if (!el) return;
      if (on) el.classList.add('pressed');
      else     el.classList.remove('pressed');
    }

    function updateStick(elId, x, y) {
      var el = document.getElementById(elId);
      if (!el) return;
      var dist = Math.sqrt(x*x + y*y);
      if (dist < DEADZONE) { x = 0; y = 0; }
      el.style.marginLeft = (x * STICK_OFFSET) + 'px';
      el.style.marginTop  = (y * STICK_OFFSET) + 'px';
      el.style.transform  = 'rotateX(' + (y * -STICK_OFFSET) + 'deg) rotateY(' + (x * STICK_OFFSET) + 'deg)';
    }

    function poll() {
      var pads = navigator.getGamepads ? navigator.getGamepads() : [];
      var gp = null;
      for (var i = 0; i < pads.length; i++) {
        if (pads[i]) { gp = pads[i]; break; }
      }

      if (!gp) {
        ctrl.classList.add('disconnected');
        requestAnimationFrame(poll);
        return;
      }

      ctrl.classList.remove('disconnected');

      // Regular buttons
      for (var b in BUTTON_MAP) {
        var btn = gp.buttons[b];
        var val = btn ? (typeof btn === 'object' ? btn.value : btn) : 0;
        setPressed(q(BUTTON_MAP[b]), val > 0.25);
      }

      // Analog triggers — use opacity for visual depth, plus pressed class at threshold
      var ltVal = gp.buttons[6] ? gp.buttons[6].value : 0;
      var rtVal = gp.buttons[7] ? gp.buttons[7].value : 0;
      var ltEl = q('lt');
      var rtEl = q('rt');
      if (ltEl) ltEl.style.opacity = ltVal;
      if (rtEl) rtEl.style.opacity = rtVal;
      setPressed(ltEl, ltVal > TRIGGER_THRESH);
      setPressed(rtEl, rtVal > TRIGGER_THRESH);

      // Analog sticks
      updateStick('stick-left',  gp.axes[0] || 0, gp.axes[1] || 0);
      updateStick('stick-right', gp.axes[2] || 0, gp.axes[3] || 0);

      requestAnimationFrame(poll);
    }

    // Start polling — gamepad only appears after first button press in browser,
    // but OBS browser source gets it immediately on connect.
    window.addEventListener('gamepadconnected', function() {
      poll();
    });

    // Kick off loop anyway in case it's already connected
    poll();
  </script>

</body>
</html>
