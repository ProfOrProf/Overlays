<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    /* === Eric Meyer's Reset CSS === */
    html, body, div, span, applet, object, iframe, h1, h2, h3, h4, h5, h6, p,
    blockquote, pre, a, abbr, acronym, address, big, cite, code, del, dfn, em,
    img, ins, kbd, q, s, samp, small, strike, strong, sub, sup, tt, var, b, u,
    i, center, dl, dt, dd, ol, ul, li, fieldset, form, label, legend, table,
    caption, tbody, tfoot, thead, tr, th, td, article, aside, canvas, details,
    embed, figure, figcaption, footer, header, hgroup, menu, nav, output, ruby,
    section, summary, time, mark, audio, video {
      margin: 0; padding: 0; border: 0; font-size: 100%; font: inherit;
      vertical-align: baseline;
    }
    article, aside, details, figcaption, figure, footer, header, hgroup,
    menu, nav, section { display: block; }
    body { line-height: 1; }
    ol, ul { list-style: none; }
    blockquote, q { quotes: none; }
    blockquote:before, blockquote:after, q:before, q:after { content: ''; content: none; }
    table { border-collapse: collapse; border-spacing: 0; }

    /* === OBS transparent background === */
    html, body {
      background: transparent !important;
      overflow: hidden;
    }

    /* === GC Controller CSS === */
    .controller {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .controller.gc {
      background: url(https://proforprof.com/GhostieController/base.svg) no-repeat;
      height: 837px;
      width: 978px;
    }
    .gc.disconnected {
      background: url(https://proforprof.com/GhostieController/disconnected.svg) no-repeat;
    }
    .gc.disconnected div { display: none; }

    /* Triggers */
    .gc .triggers {
      width: 775px; height: 95px;
      position: absolute; left: 102px;
    }
    .gc .trigger {
      width: 131px; height: 100%;
      background: url(https://proforprof.com/GhostieController/trigger.svg);
      opacity: 0;
    }
    .gc .trigger.left { float: left; }
    .gc .trigger.right { float: right; }
    .gc .trigger.pressed { opacity: 1; }

    /* Bumpers */
    .gc .bumpers {
      position: absolute; width: 792px; height: 73px;
      left: 103px; top: 138px;
    }
    .gc .bumper {
      width: 158px; height: 100%;
      background: url(https://proforprof.com/GhostieController/buttons.svg) no-repeat;
      background-position: -358px 0px;
      opacity: 0;
    }
    .gc .bumper.pressed { opacity: 1; }
    .gc .bumper.left {
      -webkit-transform: rotateY(180deg);
      transform: rotateY(180deg);
      float: left;
    }
    .gc .bumper.right { float: right; }

    /* Start */
    .gc .arrows {
      position: absolute; width: 50px; height: 50px;
      top: 324px; left: 465px;
    }
    .gc .back, .gc .start {
      width: 43px; height: 43px;
      background: #e7e7e7;
      border-radius: 100%;
      border: solid 4.5px rgba(0,0,0,0.65);
      background-clip: content-box;
      opacity: 0;
    }
    .gc .back.pressed, .gc .start.pressed {
      opacity: 1;
      filter: invert(1);
      -webkit-filter: invert(1);
    }
    .gc .back { display: none; }
    .gc .start { float: right; }

    /* ABXY */
    .gc .abxy {
      position: absolute; width: 288px; height: 230px;
      top: 207px; left: 640px;
    }
    .gc .button {
      position: absolute;
      background: url(https://proforprof.com/GhostieController/buttons.svg);
      opacity: 0;
    }
    .gc .button.pressed { opacity: 1; }
    .gc .a { background-position: 0 0; width: 114px; height: 114px; bottom: 35px; left: 91px; }
    .gc .b { width: 71px; height: 71px; background-position: -116px 0; bottom: 0px; left: 1px; }
    .gc .x { width: 66px; height: 103px; background-position: -292px 0; top: 65px; right: 0px; }
    .gc .y { width: 103px; height: 66px; background-position: -189px 0; left: 67px; top: 2px; }

    /* Sticks */
    .gc .sticks {
      position: absolute; width: 628px; height: 392px;
      top: 258px; left: 106px;
    }
    .gc .stick { position: absolute; }
    .gc .stick.left {
      top: 24px; left: 23px;
      background: url(https://proforprof.com/GhostieController/left-stick.svg) center no-repeat;
      height: 121px; width: 121px;
    }
    .gc .stick.right {
      top: calc(100% - 127px); left: calc(100% - 125px);
      background: url(https://proforprof.com/GhostieController/cstick.svg) center no-repeat;
      width: 84px; height: 84px;
    }

    /* D-Pad */
    .gc .dpad {
      position: absolute; width: 130px; height: 130px;
      top: 497px; left: 263px;
    }
    .gc .face {
      background: url(https://proforprof.com/GhostieController/dpad.svg) no-repeat;
      position: absolute; opacity: 0;
    }
    .gc .face.up, .gc .face.down { width: 44px; height: 65px; }
    .gc .face.left, .gc .face.right { width: 65px; height: 44px; }
    .gc .face.up { left: 42px; top: 0; background-position: 0px 0px; }
    .gc .face.down { left: 42px; bottom: 0; background-position: -46px 0; }
    .gc .face.left { top: 43px; left: 0; background-position: -93px 0; }
    .gc .face.right { top: 43px; right: 0px; background-position: -160px 0; }
    .gc .face.pressed { opacity: 1; }
  </style>
</head>
<body>

  <div id="gamepads">
    <!-- Template: cloned by main.js at runtime -->
    <div class="template">
      <div class="triggers">
        <span class="trigger left"        data-name="button-left-shoulder-bottom"></span>
        <span class="trigger right"       data-name="button-right-shoulder-bottom"></span>
        <span class="trigger-button left" data-name="button-left-shoulder-bottom-digital"></span>
        <span class="trigger-button right"data-name="button-right-shoulder-bottom-digital"></span>
        <span class="clear"></span>
      </div>
      <div class="bumpers">
        <span class="bumper left"  data-name="button-left-shoulder-top"></span>
        <span class="bumper right" data-name="button-right-shoulder-top"></span>
        <span class="clear"></span>
      </div>
      <div class="touchpad" data-name="touch-pad"></div>
      <div class="quadrant"></div>
      <div class="meta"    data-name="button-meta"></div>
      <div class="arrows">
        <span class="back"  data-name="button-select"></span>
        <span class="start" data-name="button-start"></span>
        <span class="clear"></span>
      </div>
      <div class="abxy">
        <span class="button a" data-name="button-1"></span>
        <span class="button b" data-name="button-2"></span>
        <span class="button x" data-name="button-3"></span>
        <span class="button y" data-name="button-4"></span>
      </div>
      <div class="sticks">
        <span class="stick left"  data-name="stick-1"></span>
        <span class="stick right" data-name="stick-2"></span>
      </div>
      <div class="wheels">
        <span class="wheel left"  data-name="stick-1-wheel"></span>
        <span class="wheel right" data-name="stick-2-wheel"></span>
      </div>
      <div class="dpad">
        <span class="face up"    data-name="button-dpad-top"></span>
        <span class="face down"  data-name="button-dpad-bottom"></span>
        <span class="face left"  data-name="button-dpad-left"></span>
        <span class="face right" data-name="button-dpad-right"></span>
      </div>
      <div class="fstick" data-name="arcade-stick"></div>
    </div>

    <!-- Four controller slots; main.js picks the right one via ?p= -->
    <div class="controller gc disconnected" id="gamepad-0"></div>
    <div class="controller gc disconnected" id="gamepad-1"></div>
    <div class="controller gc disconnected" id="gamepad-2"></div>
    <div class="controller gc disconnected" id="gamepad-3"></div>
  </div>

  <!-- Load order matters: queue → gamepad → tester → jQuery → main -->
  <script src="queue.js"></script>
  <script src="gamepad.js"></script>
  <script src="tester.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
  <script src="main.js"></script>

  <script>
    tester.init();
    gamepadSupport.init();
  </script>
</body>
</html>
