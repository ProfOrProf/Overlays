<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #333;
      overflow: hidden;
      width: 978px; height: 837px;
    }

    .controller {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .controller.gc {
      background: url(https://proforprof.com/GhostieController/base.svg) no-repeat;
      height: 837px; width: 978px;
    }

    /* Triggers */
    .gc .triggers {
      width: 775px; height: 95px;
      position: absolute; left: 102px;
    }
    .gc .trigger {
      width: 131px; height: 100%;
      background: url(https://proforprof.com/GhostieController/trigger.svg) no-repeat;
      opacity: 0.5;  /* FORCED VISIBLE */
    }
    .gc .trigger.left  { float: left; }
    .gc .trigger.right { float: right; }

    /* Bumpers */
    .gc .bumpers {
      position: absolute; width: 792px; height: 73px;
      left: 103px; top: 138px;
    }
    .gc .bumper {
      width: 158px; height: 73px;
      opacity: 0.5;  /* FORCED VISIBLE */
    }
    .gc .bumper.left {
      float: left;
      background: url(https://proforprof.com/GhostieController/lbpress.svg) no-repeat center;
      background-size: contain;
    }
    .gc .bumper.right {
      float: right;
      background: url(https://proforprof.com/GhostieController/rbpress.svg) no-repeat center;
      background-size: contain;
    }

    /* Start */
    .gc .arrows {
      position: absolute; width: 50px; height: 50px;
      top: 324px; left: 465px;
    }
    .gc .start {
      width: 43px; height: 43px;
      background: #e7e7e7;
      border-radius: 100%;
      border: solid 4.5px rgba(0,0,0,0.65);
      background-clip: content-box;
      opacity: 0.5;  /* FORCED VISIBLE */
    }

    /* ABXY */
    .gc .abxy {
      position: absolute; width: 288px; height: 230px;
      top: 207px; left: 640px;
    }
    .gc .button {
      position: absolute;
      background-repeat: no-repeat;
      background-size: contain;
      opacity: 0.6;  /* FORCED VISIBLE */
    }
    .gc .a {
      background-image: url(https://proforprof.com/GhostieController/apress.svg);
      width: 114px; height: 114px;
      bottom: 35px; left: 91px;
    }
    .gc .b {
      background-image: url(https://proforprof.com/GhostieController/bpress.svg);
      width: 71px; height: 71px;
      bottom: 0px; left: 1px;
    }
    .gc .x {
      background-image: url(https://proforprof.com/GhostieController/xpress.svg);
      width: 66px; height: 103px;
      top: 65px; right: 0px;
    }
    .gc .y {
      background-image: url(https://proforprof.com/GhostieController/ypress.svg);
      width: 103px; height: 66px;
      left: 67px; top: 2px;
    }

    /* Sticks */
    .gc .sticks {
      position: absolute; width: 628px; height: 392px;
      top: 258px; left: 106px;
    }
    .gc .stick { position: absolute; }
    .gc .stick.left {
      top: 24px; left: 23px;
      background: url(https://proforprof.com/GhostieController/left-stick.svg) center no-repeat;
      height: 121px; width: 121px;
      opacity: 0.5;
    }
    .gc .stick.right {
      top: calc(100% - 127px); left: calc(100% - 125px);
      background: url(https://proforprof.com/GhostieController/cstick.svg) center no-repeat;
      width: 84px; height: 84px;
      opacity: 0.5;
    }

    /* D-Pad */
    .gc .dpad {
      position: absolute; width: 130px; height: 130px;
      top: 497px; left: 263px;
    }
    .gc .face {
      background: url(https://proforprof.com/GhostieController/dpad.svg) no-repeat;
      position: absolute;
      opacity: 0.5;  /* FORCED VISIBLE */
    }
    .gc .face.up,   .gc .face.down  { width: 44px; height: 65px; }
    .gc .face.left, .gc .face.right { width: 65px; height: 44px; }
    .gc .face.up    { left: 42px; top: 0;    background-position: 0px 0px;  }
    .gc .face.down  { left: 42px; bottom: 0; background-position: -46px 0;  }
    .gc .face.left  { top: 43px;  left: 0;   background-position: -93px 0;  }
    .gc .face.right { top: 43px;  right: 0;  background-position: -160px 0; }
  </style>
</head>
<body>

  <div class="controller gc" id="controller">
    <div class="triggers">
      <div class="trigger left"></div>
      <div class="trigger right"></div>
      <div style="clear:both"></div>
    </div>
    <div class="bumpers">
      <div class="bumper left"></div>
      <div class="bumper right"></div>
      <div style="clear:both"></div>
    </div>
    <div class="arrows">
      <div class="start"></div>
    </div>
    <div class="abxy">
      <span class="button a"></span>
      <span class="button b"></span>
      <span class="button x"></span>
      <span class="button y"></span>
    </div>
    <div class="sticks">
      <div class="stick left"></div>
      <div class="stick right"></div>
    </div>
    <div class="dpad">
      <div class="face up"></div>
      <div class="face down"></div>
      <div class="face left"></div>
      <div class="face right"></div>
    </div>
  </div>

</body>
</html>
