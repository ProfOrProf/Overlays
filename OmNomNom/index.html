<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profagachi Damacy — P0 breadboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; min-height: 100%;
    background: #15171a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px;
    font-family: "Courier New", ui-monospace, monospace;
    user-select: none;
  }
  .tapcap {
    text-align: center; color: #9bbc0f; opacity: .9;
    font-size: 15px; letter-spacing: 2px; text-transform: uppercase;
  }
  .gameboy {
    background: #cfc9bb;
    padding: 22px 24px 14px 24px;
    border-radius: 12px 12px 74px 14px;
    box-shadow: 0 22px 50px rgba(0,0,0,.55),
                inset 0 2px 0 rgba(255,255,255,.6),
                inset 0 -4px 8px rgba(0,0,0,.16);
  }
  .bezel {
    position: relative;
    background: #8e8d85;
    padding: 16px 56px 58px 64px;
    border-radius: 8px 8px 36px 8px;
    box-shadow: inset 0 3px 9px rgba(0,0,0,.5), inset 0 -2px 3px rgba(255,255,255,.1);
  }
  .topbar {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 12px;
  }
  .stripes { flex: 1; height: 8px; position: relative; }
  .stripes::before, .stripes::after {
    content: ""; position: absolute; left: 0; right: 0; height: 2px;
  }
  .stripes::before { top: 1px; background: #3a3f7e; }
  .stripes::after  { top: 5px; background: #8c3a5c; }
  .dmt { font-size: 10px; letter-spacing: 1.5px; color: #5b5f86; white-space: nowrap; }
  .battery {
    position: absolute; left: 18px; top: 48%;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .led {
    width: 10px; height: 10px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ff8a78, #bf2729 70%);
    box-shadow: 0 0 7px rgba(210,40,40,.7), inset 0 0 2px rgba(0,0,0,.45);
  }
  .batlabel { font-size: 8px; letter-spacing: 1px; color: #45453e; }
  canvas {
    display: block;
    image-rendering: pixelated;
    box-shadow: inset 0 0 0 2px rgba(15,56,15,.35);
  }
  .wordmark {
    text-align: center; margin-top: 14px; color: #2c2c6e; white-space: nowrap;
  }
  .proftendo { font-family: "Press Start 2P", monospace; font-size: 13px; vertical-align: baseline; }
  .dummy { font-size: 27px; font-weight: 800; font-style: italic; letter-spacing: 1px; margin-left: 12px; }
  .tm { font-size: 11px; font-weight: 700; margin-left: 4px; vertical-align: baseline; }
</style>
</head>
<body>
  <div class="gameboy">
    <div class="bezel">
      <div class="topbar">
        <span class="stripes"></span>
        <span class="dmt">DOT MATRIX WITH STEREO SOUND</span>
        <span class="stripes"></span>
      </div>
      <div class="battery"><span class="led"></span><span class="batlabel">BATTERY</span></div>
      <canvas id="c"></canvas>
    </div>
    <div class="wordmark"><span class="proftendo">Proftendo</span> <span class="dummy">GAME&nbsp;DUMMY</span><span class="tm">TM</span></div>
  </div>
  <div class="tapcap">Just Tap Spacebar!</div>

<script>
(() => {
  "use strict";

  const VIS = 50;
  const MARGIN = 5;
  const CELL = 12;
  const HUD_H = 44;
  const ORB_COUNT = 10;
  const ORB_SPEED = 1.0;
  const PTS_PER_SIZE = 5;

  const REACH = 2;
  const THWOMP_STEP = 2;
  const TARGET_SWITCH = 1.6;
  const MOVE_MS = 110;
  const FLICK_OUT_MS = 90;
  const FLICK_IN_MS = 130;

  const BASE_R = 7;
  const HOVER_R = 2.5;
  const HOVER_PERIOD = 8;
  const LOBES = 4;
  const AMP_RATIO = 0.214;
  const ROT_MS = 7000;
  const BREATH_MS = 1600;
  const BREATH_AMP = 0.25;
  const REACH_BUMP = 3;
  const BUMP_WIDTH = 0.45;
  const EYE_GLYPH = [[1,0],[0,1],[1,1]];
  const EYE_ANCHORS = [[-2,-1],[1,-1]];

  const SHAPES = ["circle","square","triangle","x"];
  const SHAPE_R = 2.4;
  const SHAPE_SHRINK = 0.6;
  const SHAPE_FADE_SIZES = 4;
  const SHAPE_BIG_CHANCE = 0.18;
  const FADE_IN_MS = 600;
  const SPAWN_GAP = 2;
  const FIELD_MIN = -MARGIN;
  const FIELD_MAX = VIS - 1 + MARGIN;

  const C = { darkest:"#0f380f", dark:"#306230", light:"#8bac0f", lightest:"#9bbc0f" };

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const W = VIS*CELL, H = HUD_H + VIS*CELL;
  canvas.width = W; canvas.height = H;
  const cellPx = (c) => c*CELL;
  const fieldTop = HUD_H;
  const rand = (lo,hi) => lo + Math.random()*(hi-lo);

  let anchor, size, score;
  let moveAnim = null, flick = null, lockTarget = null;

  function blobRadius() { return BASE_R + HOVER_R * 0.5 * (1 - Math.cos(2*Math.PI*(size-1)/HOVER_PERIOD)); }

  function distFromBlob(px,py) {
    return Math.hypot(px-anchor.x, py-anchor.y) - blobRadius();
  }

  let orbs;
  function shapeForSize(s) { return SHAPES[Math.floor(s/5) % SHAPES.length]; }
  function orbRadius(o) { return o.baseR * Math.pow(SHAPE_SHRINK, size - o.spawnSize); }
  function makeOrb() {
    const baseR = SHAPE_R * (Math.random() < SHAPE_BIG_CHANCE ? rand(1.8,3.2) : rand(0.7,1.3));
    const clear = blobRadius() + baseR + SPAWN_GAP;
    let x,y,tries=0;
    do { x=rand(2,VIS-3); y=rand(2,VIS-3); tries++; }
    while (tries<120 && Math.hypot(x-anchor.x,y-anchor.y) < clear);
    const a = Math.random()*Math.PI*2;
    return { x,y, vx:Math.cos(a)*ORB_SPEED, vy:Math.sin(a)*ORB_SPEED, shape:shapeForSize(size), spawnSize:size, baseR, spawnT:performance.now() };
  }
  function resetGame() {
    anchor = { x:(VIS/2)|0, y:(VIS/2)|0 };
    size=1; score=0; moveAnim=null; flick=null; lockTarget=null;
    orbs = Array.from({length:ORB_COUNT}, () => makeOrb());
  }

  function eat(target) {
    const i = orbs.indexOf(target);
    if (i>=0) orbs.splice(i,1);
    orbs.push(makeOrb());
    score += 1;
    if (score % PTS_PER_SIZE === 0) size += 1;
  }
  function huntable(o) {
    const m = blobRadius();
    const ax = Math.max(m, Math.min(VIS-1-m, o.x));
    const ay = Math.max(m, Math.min(VIS-1-m, o.y));
    return Math.hypot(o.x-ax, o.y-ay) - blobRadius() - orbRadius(o) <= REACH;
  }
  function tryMove(dx,dy) {
    const m = blobRadius();
    if (anchor.x+dx < m || anchor.x+dx > VIS-1-m) dx=0;
    if (anchor.y+dy < m || anchor.y+dy > VIS-1-m) dy=0;
    anchor.x+=dx; anchor.y+=dy;
    return dx!==0 || dy!==0;
  }

  function doThwomp() {
    const hunt = orbs.filter(huntable);
    if (!hunt.length) { lockTarget=null; return; }
    const dist = (o) => distFromBlob(o.x,o.y) - orbRadius(o);

    let minD=Infinity;
    for (const o of hunt){ const d=dist(o); if(d<minD) minD=d; }

    if (!lockTarget || !huntable(lockTarget) || orbs.indexOf(lockTarget)<0 ||
        dist(lockTarget) > minD*TARGET_SWITCH + 0.5) {
      const tied = hunt.filter(o => dist(o) <= minD+1e-6);
      lockTarget = tied[(Math.random()*tied.length)|0];
    }
    const target = lockTarget;

    const fromX=anchor.x, fromY=anchor.y;
    let hit = dist(target) <= REACH;
    if (!hit) {
      for (let s=0;s<THWOMP_STEP;s++){
        const sx=Math.sign(target.x-anchor.x), sy=Math.sign(target.y-anchor.y);
        if ((sx===0&&sy===0) || !tryMove(sx,sy)) break;
      }
      hit = dist(target) <= REACH;
    }
    if (fromX!==anchor.x || fromY!==anchor.y)
      moveAnim = { fx:fromX, fy:fromY, tx:anchor.x, ty:anchor.y, start:performance.now() };

    flick = { ang:Math.atan2(target.y-anchor.y, target.x-anchor.x), start:performance.now(), hit };
    if (hit) { eat(target); lockTarget=null; }
  }

  function update(dt) {
    const br = blobRadius();
    for (const o of orbs){
      o.x+=o.vx*dt; o.y+=o.vy*dt;
      if (o.x<FIELD_MIN){o.x=FIELD_MIN;o.vx=-o.vx;} else if(o.x>FIELD_MAX){o.x=FIELD_MAX;o.vx=-o.vx;}
      if (o.y<FIELD_MIN){o.y=FIELD_MIN;o.vy=-o.vy;} else if(o.y>FIELD_MAX){o.y=FIELD_MAX;o.vy=-o.vy;}
      const dx=o.x-anchor.x, dy=o.y-anchor.y, d=Math.hypot(dx,dy), minD=br+orbRadius(o);
      if (d>1e-4 && d<minD){
        const nx=dx/d, ny=dy/d;
        o.x=anchor.x+nx*minD; o.y=anchor.y+ny*minD;
        const vn=o.vx*nx+o.vy*ny;
        if (vn<0){ o.vx-=2*vn*nx; o.vy-=2*vn*ny; }
      }
      if (size - o.spawnSize > SHAPE_FADE_SIZES) Object.assign(o, makeOrb());
    }
  }

  function fillCell(x,y){ ctx.fillRect(cellPx(x), fieldTop+cellPx(y), CELL, CELL); }

  function radiusAt(th, t) {
    const rot = 2*Math.PI * t / ROT_MS;
    const amp = AMP_RATIO * blobRadius() * (1 + BREATH_AMP*Math.sin(2*Math.PI*t/BREATH_MS));
    let r = blobRadius() + amp*Math.cos(LOBES*th - rot);
    if (flick) {
      const e = t - flick.start, total = FLICK_OUT_MS+FLICK_IN_MS;
      if (e < total) {
        const prog = e<FLICK_OUT_MS ? e/FLICK_OUT_MS : 1-(e-FLICK_OUT_MS)/FLICK_IN_MS;
        let d = th - flick.ang;
        d = Math.atan2(Math.sin(d), Math.cos(d));
        r += prog * REACH_BUMP * Math.exp(-(d*d)/(2*BUMP_WIDTH*BUMP_WIDTH));
      }
    }
    return r;
  }

  function simplifyLoop(pts) {
    let arr = pts;
    for (let pass=0; pass<10; pass++) {
      const n = arr.length;
      if (n < 5) break;
      const keep = new Array(n).fill(true);
      let changed = false;
      for (let i=0;i<n;i++){
        let pi=(i-1+n)%n; while(!keep[pi]) pi=(pi-1+n)%n;
        let ni=(i+1)%n; while(!keep[ni]) ni=(ni+1)%n;
        if (pi===i || ni===i || pi===ni) continue;
        const p=arr[pi], q=arr[ni];
        if (Math.max(Math.abs(p.x-q.x), Math.abs(p.y-q.y)) <= 1) { keep[i]=false; changed=true; i++; }
      }
      if (!changed) break;
      arr = arr.filter((_,i)=>keep[i]);
    }
    return arr;
  }

  function traceLoop(cxr, cyr, t) {
    const N = 480;
    const pts = [];
    let last = null;
    for (let k=0;k<=N;k++){
      const th = k/N * 2*Math.PI;
      const r = radiusAt(th, t);
      const x = Math.round(cxr + r*Math.cos(th));
      const y = Math.round(cyr + r*Math.sin(th));
      if (!last || x!==last.x || y!==last.y){ pts.push({x,y}); last={x,y}; }
    }
    while (pts.length>1 && pts[0].x===pts[pts.length-1].x && pts[0].y===pts[pts.length-1].y) pts.pop();
    return pts.length < 4 ? pts : simplifyLoop(pts);
  }

  function draw() {
    ctx.fillStyle = C.lightest; ctx.fillRect(0,0,W,H);

    ctx.fillStyle = C.darkest;
    ctx.font = "bold 18px 'Courier New', monospace";
    ctx.textBaseline = "middle";
    ctx.textAlign="left"; ctx.fillText("SCORE "+score, 10, HUD_H/2);
    ctx.textAlign="right"; ctx.fillText("SIZE "+size, W-10, HUD_H/2);
    ctx.fillRect(0, HUD_H-2, W, 2);

    ctx.save();
    ctx.beginPath(); ctx.rect(0, fieldTop, W, VIS*CELL); ctx.clip();

    const now = performance.now();
    if (flick && now-flick.start >= FLICK_OUT_MS+FLICK_IN_MS) flick=null;

    ctx.strokeStyle=C.dark; ctx.lineCap="round"; ctx.lineJoin="round";
    for (const o of orbs){
      const px=cellPx(o.x)+CELL/2, py=fieldTop+cellPx(o.y)+CELL/2;
      const r=orbRadius(o)*CELL;
      ctx.globalAlpha = Math.min(1, (now - o.spawnT)/FADE_IN_MS);
      ctx.lineWidth = Math.max(2, r*0.16);
      if (o.shape==="square") {
        const s=r*1.4; ctx.strokeRect(px-s, py-s, s*2, s*2);
      } else if (o.shape==="triangle") {
        ctx.beginPath(); ctx.moveTo(px, py-r*1.3); ctx.lineTo(px-r*1.15, py+r*0.9); ctx.lineTo(px+r*1.15, py+r*0.9); ctx.closePath(); ctx.stroke();
      } else if (o.shape==="x") {
        ctx.beginPath(); ctx.moveTo(px-r,py-r); ctx.lineTo(px+r,py+r); ctx.moveTo(px+r,py-r); ctx.lineTo(px-r,py+r); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    let rax=anchor.x, ray=anchor.y;
    if (moveAnim){
      const e=now-moveAnim.start;
      if (e>=MOVE_MS) moveAnim=null;
      else { const p=e/MOVE_MS; rax=moveAnim.fx+Math.round((moveAnim.tx-moveAnim.fx)*p); ray=moveAnim.fy+Math.round((moveAnim.ty-moveAnim.fy)*p); }
    }

    const loop = traceLoop(rax, ray, now);
    ctx.fillStyle = C.darkest;
    for (const c of loop) fillCell(c.x, c.y);

    for (const [ax,ay] of EYE_ANCHORS)
      for (const [gx,gy] of EYE_GLYPH) fillCell(rax+ax+gx, ray+ay+gy);

    ctx.restore();
  }

  let last = performance.now();
  function frame(now){
    let dt=(now-last)/1000; last=now;
    if (dt>0.1) dt=0.1;
    update(dt); draw();
    requestAnimationFrame(frame);
  }

  window.addEventListener("keydown", (e)=>{
    if (e.code==="Space"){ e.preventDefault(); doThwomp(); }
    else if (e.key==="r"||e.key==="R") resetGame();
  });
  canvas.addEventListener("pointerdown", (e)=>{ e.preventDefault(); doThwomp(); });

  resetGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
